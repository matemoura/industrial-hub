services:
  - type: web
    name: industrial-hub-backend
    runtime: docker
    dockerfilePath: apps/backend/Dockerfile
    dockerContext: apps/backend
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        value: postgres
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: STORAGE_ENDPOINT
        sync: false
      - key: STORAGE_BUCKET
        value: industrial-hub
      - key: STORAGE_ACCESS_KEY
        sync: false
      - key: STORAGE_SECRET_KEY
        sync: false
      - key: STORAGE_REGION
        value: auto
      - key: MAIL_ENABLED
        value: "false"
