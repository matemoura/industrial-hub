<div class="nc-form-page sp-page">
  <div class="sp-page-header">
    <div>
      <p class="sp-kicker">QMS · NÃO CONFORMIDADES</p>
      <h1 class="sp-title">Nova <span class="sp-title-accent">/ NC</span></h1>
    </div>
    <div class="sp-page-actions">
      <a routerLink="/qms/non-conformances" class="back-link">← Voltar</a>
    </div>
  </div>

  <form class="nc-form" (ngSubmit)="submit()">

    <label class="form-field">
      Título <span class="required">*</span>
      <input
        type="text"
        [ngModel]="title()"
        (ngModelChange)="title.set($event)"
        name="title"
        maxlength="200"
        placeholder="Descreva brevemente a não-conformidade"
        data-testid="nc-title"
        required
      />
    </label>

    <div class="form-row">
      <label class="form-field">
        Tipo <span class="required">*</span>
        <select
          [ngModel]="type()"
          (ngModelChange)="onTypeChange($event)"
          name="type"
          data-testid="nc-type"
          required
        >
          <option value="">Selecione…</option>
          @for (t of ncTypes; track t) {
            <option [value]="t">{{ typeLabels[t] }}</option>
          }
        </select>
      </label>

      <label class="form-field">
        Severidade <span class="required">*</span>
        <select
          [ngModel]="severity()"
          (ngModelChange)="severity.set($event)"
          name="severity"
          data-testid="nc-severity"
          required
        >
          <option value="">Selecione…</option>
          @for (s of ncSeverities; track s) {
            <option [value]="s">{{ severityLabels[s] }}</option>
          }
        </select>
      </label>
    </div>

    @if (isSupplierType()) {
      <label class="form-field">
        Fornecedor <span class="required">*</span>
        <select
          [ngModel]="supplierId()"
          (ngModelChange)="supplierId.set($event)"
          name="supplierId"
          data-testid="nc-supplier"
          required
        >
          <option value="">Selecione o fornecedor…</option>
          @for (s of suppliers(); track s.id) {
            <option [value]="s.id">{{ s.name }} ({{ s.code }})</option>
          }
        </select>
      </label>
    }

    <label class="form-field">
      Descrição
      <textarea
        [ngModel]="description()"
        (ngModelChange)="description.set($event)"
        name="description"
        rows="4"
        placeholder="Detalhes adicionais (opcional)"
      ></textarea>
    </label>

    @if (errorMsg()) {
      <p class="msg msg--error">{{ errorMsg() }}</p>
    }

    <div class="form-actions">
      <a routerLink="/qms/non-conformances" class="sp-btn sp-btn--secondary">Cancelar</a>
      <button type="submit" class="sp-btn sp-btn--primary" data-testid="nc-submit" [disabled]="!isValid || loading()">
        {{ loading() ? 'Registrando…' : 'Registrar NC' }}
      </button>
    </div>
  </form>
</div>
