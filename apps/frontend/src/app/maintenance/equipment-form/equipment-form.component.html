<div class="equipment-form-page sp-page">
  <div class="sp-page-header">
    <div>
      <p class="sp-kicker">MANUTENÇÃO · EQUIPAMENTO</p>
      <h1 class="sp-title">Equipamento <span class="sp-title-accent">/ Formulário</span></h1>
    </div>
  </div>

  <form class="equipment-form" (ngSubmit)="submit()">

    @if (!isEditMode) {
      <div class="form-row">
        <label class="form-field">
          Código <span class="required">*</span>
          <input
            type="text"
            [ngModel]="code()"
            (ngModelChange)="code.set($event)"
            name="code"
            maxlength="50"
            placeholder="Ex.: EQ-001"
            data-testid="equipment-code"
            required
          />
        </label>

        <label class="form-field">
          Tipo <span class="required">*</span>
          <select
            [ngModel]="type()"
            (ngModelChange)="type.set($event)"
            name="type"
            data-testid="equipment-type"
            required
          >
            <option value="">Selecione…</option>
            @for (t of equipmentTypes; track t) {
              <option [value]="t">{{ typeLabels[t] }}</option>
            }
          </select>
        </label>
      </div>
    }

    @if (isEditMode) {
      <label class="form-field">
        Tipo <span class="required">*</span>
        <select
          [ngModel]="type()"
          (ngModelChange)="type.set($event)"
          name="type"
          required
        >
          <option value="">Selecione…</option>
          @for (t of equipmentTypes; track t) {
            <option [value]="t">{{ typeLabels[t] }}</option>
          }
        </select>
      </label>
    }

    <label class="form-field">
      Nome <span class="required">*</span>
      <input
        type="text"
        [ngModel]="name()"
        (ngModelChange)="name.set($event)"
        name="name"
        maxlength="200"
        placeholder="Nome do equipamento"
        data-testid="equipment-name"
        required
      />
    </label>

    <div class="form-row">
      <label class="form-field">
        Localização
        <input
          type="text"
          [ngModel]="location()"
          (ngModelChange)="location.set($event)"
          name="location"
          maxlength="100"
          placeholder="Ex.: Linha A, Setor 2 (opcional)"
        />
      </label>

      <label class="form-field">
        Data de aquisição
        <input
          type="date"
          [ngModel]="acquiredAt()"
          (ngModelChange)="acquiredAt.set($event)"
          name="acquiredAt"
        />
      </label>
    </div>

    @if (errorMsg()) {
      <p class="msg msg--error">{{ errorMsg() }}</p>
    }

    <div class="form-actions">
      <a [routerLink]="isEditMode ? ['/maintenance/equipment', editId()] : '/maintenance/equipment'" class="sp-btn sp-btn--secondary">Cancelar</a>
      <button type="submit" class="sp-btn sp-btn--primary" data-testid="equipment-submit" [disabled]="!isValid || loading()">
        @if (loading()) {
          {{ isEditMode ? 'Salvando…' : 'Cadastrando…' }}
        } @else {
          {{ isEditMode ? 'Salvar Alterações' : 'Cadastrar Equipamento' }}
        }
      </button>
    </div>
  </form>
</div>
