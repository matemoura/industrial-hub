<div class="cp-wrapper">
  <div class="cp-card">
    <div class="cp-header">
      <div class="cp-icon" aria-hidden="true">🔒</div>
      <h1 class="cp-title">Alterar Senha</h1>
      <p class="cp-subtitle">Defina uma nova senha segura para a sua conta.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>

      @if (error()) {
        <div class="alert-error" role="alert" aria-live="polite">{{ error() }}</div>
      }

      <div class="field">
        <label for="currentPassword">Senha atual</label>
        <input
          id="currentPassword"
          type="password"
          formControlName="currentPassword"
          autocomplete="current-password"
          placeholder="••••••••"
          [class.invalid]="form.controls.currentPassword.invalid && form.controls.currentPassword.touched"
        />
      </div>

      <div class="field">
        <label for="newPassword">Nova senha</label>
        <input
          id="newPassword"
          type="password"
          formControlName="newPassword"
          autocomplete="new-password"
          placeholder="Mín. 8 chars, 1 maiúscula, 1 dígito"
          [class.invalid]="form.controls.newPassword.invalid && form.controls.newPassword.touched"
        />
      </div>

      <div class="field">
        <label for="confirmPassword">Confirmar nova senha</label>
        <input
          id="confirmPassword"
          type="password"
          formControlName="confirmPassword"
          autocomplete="new-password"
          placeholder="Repita a nova senha"
          [class.invalid]="passwordsMismatch"
        />
        @if (passwordsMismatch) {
          <span class="field-error">As senhas não coincidem.</span>
        }
      </div>

      <button
        type="submit"
        class="submit-btn"
        [disabled]="form.invalid || loading()"
      >
        @if (loading()) {
          <span class="spinner" aria-hidden="true"></span>
          Salvando…
        } @else {
          Alterar Senha
        }
      </button>
    </form>
  </div>
</div>
