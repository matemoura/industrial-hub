<div class="login-wrapper">
  <div class="login-card">
    <div class="login-brand">
      <div class="brand-logo">
        <div class="brand-mark">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
            <rect width="28" height="28" rx="7" fill="white" fill-opacity="0.2" />
            <path d="M7 9h4l3 6 3-6h4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="14" cy="18" r="2.5" fill="white"/>
          </svg>
        </div>
        <div class="brand-text">
          <span class="brand-name">Industrial Hub</span>
          <span class="brand-sub">Medical System do Brasil</span>
        </div>
      </div>
      <div class="brand-divider"></div>
    </div>

    <form class="login-form" [formGroup]="form" (ngSubmit)="submit()" novalidate>
      @if (error()) {
        <div class="error-alert" role="alert" aria-live="polite">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <circle cx="8" cy="8" r="7" stroke="#dc2626" stroke-width="1.5"/>
            <path d="M8 5v3.5M8 11h.01" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span>{{ error() }}</span>
        </div>
      }

      <div class="field">
        <label for="username">Usuário</label>
        <input
          id="username"
          type="text"
          formControlName="username"
          placeholder="seu.usuario"
          autocomplete="username"
          [class.invalid]="form.controls.username.invalid && form.controls.username.touched"
          aria-required="true"
        />
      </div>

      <div class="field">
        <label for="password">Senha</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          autocomplete="current-password"
          [class.invalid]="form.controls.password.invalid && form.controls.password.touched"
          aria-required="true"
        />
      </div>

      <button type="submit" class="submit-btn" [disabled]="loading()" aria-label="Entrar no sistema">
        @if (loading()) {
          <span class="spinner" aria-hidden="true"></span>
          <span>Entrando…</span>
        } @else {
          <span>Entrar</span>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M3 8h10M9 4l4 4-4 4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        }
      </button>
    </form>

    <footer class="login-footer">
      © {{ currentYear }} Medical System do Brasil — Todos os direitos reservados.
    </footer>
  </div>
</div>
