# Test datasource (H2)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# JWT (test)
app.jwt.secret=aW5kdXN0cmlhbGh1Yi1tc2Itc2VjcmV0LWtleS1mb3ItZGV2ZWxvcG1lbnQtb25seQ==
app.jwt.expiration-ms=3600000
# SEC-036: disable startup check in tests — secret is intentionally the dev placeholder
app.jwt.validate-secret=false

# Storage (test — points to a dummy endpoint; S3Client will not actually connect)
app.storage.bucket=test-bucket
app.storage.endpoint=http://localhost:9000
app.storage.access-key=test
app.storage.secret-key=test
app.storage.region=us-east-1
app.storage.presign-ttl-minutes=15
