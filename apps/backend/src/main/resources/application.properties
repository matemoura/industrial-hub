spring.application.name=backend

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/industrial_hub
spring.datasource.username=hub_user
spring.datasource.password=hub_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Server
server.port=8080

# Multipart (Excel upload)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT — replace secret with a strong Base64-encoded key (min 256 bits) in production
app.jwt.secret=aW5kdXN0cmlhbGh1Yi1tc2Itc2VjcmV0LWtleS1mb3ItZGV2ZWxvcG1lbnQtb25seQ==
app.jwt.expiration-ms=28800000

# Mail — disabled by default in dev/test; set MAIL_ENABLED=true in production
spring.mail.host=${MAIL_HOST:smtp.example.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
mail.enabled=${MAIL_ENABLED:false}
