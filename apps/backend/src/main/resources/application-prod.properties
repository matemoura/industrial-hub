# ── Database (Supabase → Project Settings → Database) ────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.main.lazy-initialization=true
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── Server ───────────────────────────────────────────────────────────────────
server.port=8080
server.tomcat.max-http-form-post-size=2MB
server.tomcat.threads.max=20
server.tomcat.threads.min-spare=2

# ── Multipart ────────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── JWT ──────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=28800000

# ── CORS — URL pública do frontend no Vercel ─────────────────────────────────
app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# ── Mail ─────────────────────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:noreply@msb.com.br}

# ── Storage S3-compatible (Cloudflare R2 / AWS S3) ───────────────────────────
app.storage.bucket=${STORAGE_BUCKET:industrial-hub}
app.storage.endpoint=${STORAGE_ENDPOINT:}
app.storage.access-key=${STORAGE_ACCESS_KEY:}
app.storage.secret-key=${STORAGE_SECRET_KEY:}
app.storage.region=${STORAGE_REGION:auto}
app.storage.presign-ttl-minutes=15

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.health.mail.enabled=false
management.health.dynamicsImport.enabled=false

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN
logging.level.com.industrialhub=INFO
