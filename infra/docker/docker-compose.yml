services:
  postgres:
    image: postgres:16
    container_name: industrial-hub-db
    environment:
      POSTGRES_DB: industrial_hub
      POSTGRES_USER: hub_user
      POSTGRES_PASSWORD: hub_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hub_user -d industrial_hub"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ../../apps/backend
    container_name: industrial-hub-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/industrial_hub
      SPRING_DATASOURCE_USERNAME: hub_user
      SPRING_DATASOURCE_PASSWORD: hub_pass
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../../apps/frontend
    container_name: industrial-hub-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
